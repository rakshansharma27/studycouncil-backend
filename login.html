<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | StudyCouncil</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/navbar.css"><link rel="stylesheet" href="css/auth.css">
</head>
<body class="page-fade">
  <div class="bg-mesh" aria-hidden="true"><div class="mesh-orb mesh-orb-1"></div><div class="mesh-orb mesh-orb-2"></div><div class="mesh-orb mesh-orb-3"></div><div class="mesh-orb mesh-orb-4"></div></div>
  <nav class="navbar" id="navbar"><div class="nav-container"><a href="index.html" class="nav-logo">StudyCouncil ✦</a><div class="nav-links" id="navLinks"><a href="index.html">Home</a><a href="pricing.html">Pricing</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="login.html" class="nav-login active">Log In</a><a href="signup.html" class="nav-cta">Start Free</a></div><button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button></div></nav>
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">StudyCouncil ✦</a>
      <p class="auth-subtitle">Welcome back! Continue your learning journey.</p>
      <div class="social-btns">
        <button class="btn-social">🔵 Google</button>
        <button class="btn-social">⬛ GitHub</button>
      </div>
      <div class="divider">or continue with email</div>
      <form class="auth-form" id="loginForm">
        <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@email.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" required></div>
        <button type="submit" class="btn-primary">Log In →</button>
      </form>
      <div class="auth-links">
        <a href="#">Forgot password?</a>
        <span>No account? <a href="signup.html">Sign up free</a></span>
      </div>
    </div>
  </div>
  <script src="js/navbar.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
