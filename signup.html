<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | StudyCouncil</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/navbar.css"><link rel="stylesheet" href="css/auth.css">
</head>
<body class="page-fade">
  <div class="bg-mesh" aria-hidden="true"><div class="mesh-orb mesh-orb-1"></div><div class="mesh-orb mesh-orb-2"></div><div class="mesh-orb mesh-orb-3"></div><div class="mesh-orb mesh-orb-4"></div></div>
  <nav class="navbar" id="navbar"><div class="nav-container"><a href="index.html" class="nav-logo">StudyCouncil ✦</a><div class="nav-links" id="navLinks"><a href="index.html">Home</a><a href="pricing.html">Pricing</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="login.html" class="nav-login">Log In</a><a href="signup.html" class="nav-cta active">Start Free</a></div><button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button></div></nav>
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">StudyCouncil ✦</a>
      <p class="auth-subtitle">Create your free account. No credit card needed.</p>
      <div class="social-btns">
        <button class="btn-social">🔵 Sign up with Google</button>
        <button class="btn-social">⬛ GitHub</button>
      </div>
      <div class="divider">or sign up with email</div>
      <form class="auth-form" id="signupForm">
        <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Arjun Mehta" required></div>
        <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@email.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Create a strong password" required></div>
        <div class="form-group">
          <label>I am a...</label>
          <select id="role" required>
            <option value="">Select your role</option>
            <option value="School Student K-12">School Student (K-12)</option>
            <option value="College Student">College / University Student</option>
            <option value="Competitive Exam Aspirant">Competitive Exam Aspirant</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Create Free Account →</button>
      </form>
      <div class="auth-links" style="justify-content:center">
        <span>Already have an account? <a href="login.html">Log in</a></span>
      </div>
    </div>
  </div>
  <script src="js/navbar.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
